<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- squircle background -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)"/>

  <!-- main "P12" wordmark -->
  <text x="128" y="166"
        font-family="'Arial Black','Segoe UI Black','Helvetica',sans-serif"
        font-weight="900"
        font-size="100"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-2">P12</text>

  <!-- amber accent diamond — top-right corner, suggests private key.
       White stroke gives a hard edge against the blue background so the
       silhouette survives 16-24 px downscaling without softening into
       the gradient. -->
  <rect x="184" y="32" width="32" height="32" rx="4"
        fill="#fbbf24"
        stroke="#ffffff"
        stroke-width="2.5"
        transform="rotate(45 200 48)"/>
</svg>
